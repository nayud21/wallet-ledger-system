services:
  postgres:
    image: postgres:15-alpine
    container_name: wallet-ledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: walletledger
      POSTGRES_USER: walletledger
      POSTGRES_PASSWORD: walletledger
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U walletledger -d walletledger"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
