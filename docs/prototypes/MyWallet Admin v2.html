    minimumFractionDigits: 2,
    maximumFractionDigits: 4,
    ...opts,
  }).format(n);

const fmtTs = (d) => {
  // "2026-05-18 14:23:07 UTC"
  const pad = (x) => String(x).padStart(2, '0');
  return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())} ${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${pad(d.getUTCSeconds())} UTC`;
};

const uuid = () => {
  // RFC4122-ish v4
  const hex = (n) => Math.floor(Math.random()*16**n).toString(16).padStart(n,'0');
  return `${hex(8)}-${hex(4)}-4${hex(3)}-${(8+Math.floor(Math.random()*4)).toString(16)}${hex(3)}-${hex(12)}`;
};

function relativeTime(d){
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60)   return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400)return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

              <button

                onClick={() => setSelected(t)}
                className={`w-full grid grid-cols-[160px_minmax(0,1fr)_120px_200px_24px] gap-3 px-3 py-1.5 text-xs text-left items-center transition-colors ${active ? 'bg-indigo-50' : 'hover:bg-slate-50/80 transition-colors'} ${i<list.length-1 ? 'border-b border-slate-100' : ''}`}
              >
                <div className={`font-mono ${active ? 'text-indigo-800' : 'text-slate-800'}`}>{t.id}</div>

                <div>
                  <Badge tone={t.status==='POSTED'?'green':t.status==='PENDING'?'amber':'slate'} dot>{t.status}</Badge>

      {/* Drawer */}
      {selected && (
        <>
          <div className="fixed inset-0 bg-slate-900/10 z-30" onClick={() => setSelected(null)}/>
          <div className="fixed top-0 right-0 h-full w-[440px] bg-white border-l border-slate-200 z-40 drawer-enter flex flex-col">
            <div className="flex items-center px-3 h-11 border-b border-slate-200">
              <div className="min-w-0">
                <div className="text-xs uppercase tracking-wide text-slate-500 font-medium">Transaction</div>
                <div className="font-mono text-xs text-slate-800 truncate">{selected.id}</div>

              <button onClick={() => setSelected(null)} className="ml-auto h-7 w-7 grid place-items-center text-slate-500 hover:bg-slate-100 rounded">
                <Icon.Close className="w-3.5 h-3.5"/>
              </button>
            </div>

            <div className="px-3 py-3 border-b border-slate-200 space-y-1.5">
              <div className="text-sm text-slate-900 font-medium">{selected.desc}</div>
              <div className="flex items-center gap-2 text-xs text-slate-500">
                <Badge tone={selected.status==='POSTED'?'green':selected.status==='PENDING'?'amber':'slate'} dot>{selected.status}</Badge>
                <span className="font-mono num">{fmtTs(selected.created)}</span>
              </div>
              <div className="flex items-center gap-3 text-xs text-slate-500 pt-1">
                <div><span className="text-slate-500">Reference</span> <span className="font-mono text-slate-700">stripe_pi_3OAB29Hk</span></div>
                <div><span className="text-slate-500">Idempotency</span> <span className="font-mono text-slate-700">b81e…f902</span></div>
              </div>

            <div className="flex-1 overflow-auto">
              <div className="px-3 py-2 text-xs uppercase tracking-wide text-slate-500 font-medium border-b border-slate-100">Entries</div>

            <div className="border-t border-slate-200 p-3 flex items-center gap-2">
              <Btn variant="secondary">View related</Btn>
              <Btn variant="danger-outline" className="ml-auto" disabled={selected.status==='REVERSED'}><Icon.Reverse className="w-3.5 h-3.5"/>Reverse</Btn>
            </div>

};

const DrawerEntries = ({ tx }) => {
  const entries = TX_ENTRIES[tx] || [
    { acct: 'asset:stripe_clearing',  dir: 'DEBIT',  amount:  500.0000 },
    { acct: 'liability:wlt_8f3a1c',   dir: 'CREDIT', amount:  500.0000 },
  ];
  const sum = entries.reduce((acc, e) => acc + (e.dir==='DEBIT' ? e.amount : -e.amount), 0);

  return (
    <div>
      <div className="grid grid-cols-[minmax(0,1fr)_120px_140px] gap-3 px-3 py-1.5 text-xs uppercase tracking-wide text-slate-500 font-medium border-b border-slate-100">
        <div>Account</div>
        <div>Direction</div>
        <div className="text-right">Amount</div>
      </div>
      {entries.map((e, i) => (
        <div key={i} className="grid grid-cols-[minmax(0,1fr)_120px_140px] gap-3 px-3 py-1.5 text-xs items-center border-b border-slate-100">
          <div className="font-mono text-slate-800">{e.acct}</div>
          <div>
            {e.dir==='DEBIT'
              ? <span className="inline-flex items-center gap-1 text-slate-700 text-xs font-medium"><Icon.ArrowUp className="w-3 h-3"/>DEBIT</span>
              : <span className="inline-flex items-center gap-1 text-emerald-700 text-xs font-medium"><Icon.ArrowDown className="w-3 h-3"/>CREDIT</span>}
          </div>
          <div className="num text-right font-medium text-slate-900">{fmtMoney(e.amount)}</div>
        </div>
      ))}
      <div className="grid grid-cols-[minmax(0,1fr)_120px_140px] gap-3 px-3 py-2 text-xs items-center bg-slate-50">
        <div className="text-xs text-slate-500 uppercase tracking-wide font-medium">Sum (DR − CR)</div>
        <div className="text-xs text-emerald-700 font-medium flex items-center gap-1"><Icon.Check className="w-3 h-3"/>balanced</div>
        <div className="num text-right font-bold text-slate-900">{fmtMoney(sum)}</div>
      </div>
    </div>
  );
};

/* ---------- Screen 4: Reconciliation ---------- */
const ReconScreen = () => {
  return (
    <div className="max-w-[1440px] mx-auto p-4 space-y-3" data-screen-label="04 Reconciliation run">
      {/* Header */}
      <div className="flex items-end justify-between">
        <div>
          <div className="flex items-center gap-2 text-xs text-slate-500">
            <span>Run</span>
            <span className="font-mono text-slate-700">run_2026_05_20_08:00</span>
            <Badge tone="indigo" dot>COMPLETED</Badge>
          </div>
          <div className="text-base font-semibold tracking-tight mt-1">Stripe payouts ↔ liability:wlt_8f3a1c</div>
          <div className="text-xs text-slate-500 mt-0.5">Window 2026-05-19 00:00 → 2026-05-20 00:00 UTC · 45 records · ran 7h 18m ago</div>
        </div>
        <div className="flex items-center gap-2">
          <Btn variant="secondary">Re-run</Btn>
          <Btn variant="secondary">Export report</Btn>
          <Btn variant="primary">Finalize</Btn>
        </div>
      </div>

      {/* Summary strip */}
      <div className="grid grid-cols-5 gap-2">
        {[
          { l: 'Records',     v: '45',            tone:'slate' },
          { l: 'Matched',     v: '42',            tone:'green', sub:'93.3%' },
          { l: 'Exceptions',  v: '3',             tone:'amber' },
          { l: 'Ledger total',v: '11,415.50',     tone:'slate' },
          { l: 'Statement',   v: '11,414.25',     tone:'slate', sub:'Δ 1.25 USD' },
        ].map(k => (
          <Card key={k.l} className="px-3 py-2">
            <div className="text-xs uppercase tracking-wider text-slate-500 font-medium">{k.l}</div>
            <div className={`mt-1 text-[16px] font-semibold num tracking-tight ${k.tone==='green'?'text-emerald-700':k.tone==='amber'?'text-amber-700':'text-slate-900'}`}>{k.v}</div>
            {k.sub && <div className="text-xs text-slate-500 num">{k.sub}</div>}
          </Card>
        ))}
      </div>

      {/* Side-by-side */}
      <div className="grid grid-cols-2 gap-2">
        <MatchesPane/>
        <ExceptionsPane/>
      </div>
    </div>
  );
};

const MatchesPane = () => {
  const [open, setOpen] = useState(true);
  const [expanded, setExpanded] = useState(new Set([1, 5]));
  const toggle = (id) => setExpanded(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });

  return (
    <Card className="overflow-hidden">
      <button onClick={()=>setOpen(o=>!o)} className="w-full flex items-center gap-2 h-9 px-3 border-b border-slate-200 hover:bg-slate-50/80 transition-colors">
        <Icon.Chevron className={`w-3.5 h-3.5 text-slate-500 transition-transform ${open ? '' : '-rotate-90'}`}/>
        <span className="text-sm font-semibold text-slate-800">Matches</span>
        <Badge tone="green" dot>42</Badge>
        <span className="ml-auto text-xs text-slate-500 num">11,202.75 USD</span>
      </button>
      {open && (
        <div className="max-h-[520px] overflow-auto">
          {MATCHES.map((m, i) => {
            const isOpen = expanded.has(m.id);
            return (
              <div key={m.id} className={i<MATCHES.length-1 ? 'border-b border-slate-100' : ''}>
                <button
                  onClick={() => toggle(m.id)}
                  className="w-full px-3 py-1.5 grid grid-cols-[16px_1fr_1fr_auto] gap-2 items-center text-left hover:bg-slate-50/80 transition-colors"
                >
                  <Icon.Chevron className={`w-3 h-3 text-slate-500 transition-transform ${isOpen ? '' : '-rotate-90'}`}/>
                  <div className="min-w-0">
                    <div className="text-xs text-slate-500 uppercase tracking-wide">Ledger</div>
                    <div className="font-mono text-xs text-slate-700 truncate">{m.ledger}</div>
                  </div>
                  <div className="min-w-0">
                    <div className="text-xs text-slate-500 uppercase tracking-wide">Statement</div>
                    <div className="font-mono text-xs text-slate-700 truncate">{m.stmt}</div>
                  </div>
                  <div className="text-right">
                    <div className="num text-xs font-medium text-slate-900">{fmtMoney(m.amount)}</div>
                    <div className="text-xs text-slate-500">USD</div>
                  </div>
                </button>
                {isOpen && (
                  <div className="px-3 pb-2 pl-7 grid grid-cols-2 gap-2 text-xs">
                    <div className="border border-slate-200 rounded p-2 bg-slate-50/60">
                      <div className="text-xs uppercase tracking-wide text-slate-500 mb-0.5">Ledger</div>
                      <div className="text-slate-700">{m.desc}</div>
                      <div className="num text-xs text-slate-500 mt-1">{fmtTs(m.ts)}</div>
                    </div>
                    <div className="border border-slate-200 rounded p-2 bg-slate-50/60">
                      <div className="text-xs uppercase tracking-wide text-slate-500 mb-0.5">Statement</div>
                      <div className="text-slate-700">{m.desc}</div>
                      <div className="num text-xs text-slate-500 mt-1">{fmtTs(m.ts)}</div>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </Card>
  );
};

const ExceptionsPane = () => {
  const [open, setOpen] = useState(true);
  return (
    <Card className="overflow-hidden">
      <button onClick={()=>setOpen(o=>!o)} className="w-full flex items-center gap-2 h-9 px-3 border-b border-slate-200 hover:bg-slate-50/80 transition-colors">
        <Icon.Chevron className={`w-3.5 h-3.5 text-slate-500 transition-transform ${open ? '' : '-rotate-90'}`}/>
        <span className="text-sm font-semibold text-slate-800">Exceptions</span>
        <Badge tone="amber" dot>3</Badge>
        <span className="ml-auto text-xs text-slate-500 flex items-center gap-1"><Icon.Warn className="w-3 h-3 text-amber-500"/>needs review</span>
      </button>
      {open && (
        <div className="p-2 space-y-2 max-h-[520px] overflow-auto">
          {EXCEPTIONS.map((ex, i) => <ExceptionCard key={i} ex={ex}/>)}
        </div>
      )}
    </Card>
  );
};

const ExceptionCard = ({ ex }) => {
  const meta = {
    UNMATCHED_LEDGER:    { label:'Unmatched ledger entry',    accent:'border-l-red-500',   tone:'red'   },
    UNMATCHED_STATEMENT: { label:'Unmatched statement entry', accent:'border-l-slate-400', tone:'slate' },
    AMOUNT_MISMATCH:     { label:'Amount mismatch',           accent:'border-l-amber-500', tone:'amber' },
  }[ex.type];

  return (
    <div className={`border border-slate-200 ${meta.accent} border-l-4 rounded`}>
      <div className="flex items-center gap-2 px-2.5 py-1.5 border-b border-slate-100">
        <Badge tone={meta.tone} dot>{ex.type}</Badge>
        <span className="text-xs text-slate-600">{meta.label}</span>
        <button className="ml-auto text-xs text-slate-500 hover:text-slate-700">⋯</button>
      </div>

      <div className="p-2.5 grid grid-cols-2 gap-2">
        {/* Ledger side */}
        <div className="border border-slate-200 rounded bg-white">
          <div className="px-2 py-1 text-xs uppercase tracking-wide text-slate-500 border-b border-slate-100 flex items-center justify-between">
            <span>Ledger</span>
            {ex.ledger && <span className="font-mono text-xs text-slate-500 normal-case">{ex.ledger.id}</span>}
          </div>
          <div className="px-2 py-1.5">
            {ex.ledger ? (
              <>
                <div className="text-xs text-slate-700 truncate">{ex.ledger.desc}</div>
                <div className={`text-sm font-semibold num mt-0.5 ${ex.type==='AMOUNT_MISMATCH' ? 'text-amber-700 bg-amber-50 rounded px-1 -mx-1 inline-block' : 'text-slate-900'}`}>{fmtMoney(ex.ledger.amount)} <span className="text-xs text-slate-500 font-normal">USD</span></div>
                <div className="text-xs text-slate-500 num mt-0.5">{fmtTs(ex.ledger.ts)}</div>
              </>
            ) : (
              <div className="text-xs text-slate-500 italic">— not found</div>
            )}
          </div>
        </div>

        {/* Statement side */}
        <div className="border border-slate-200 rounded bg-white">
          <div className="px-2 py-1 text-xs uppercase tracking-wide text-slate-500 border-b border-slate-100 flex items-center justify-between">
            <span>Statement</span>
            {ex.stmt && <span className="font-mono text-xs text-slate-500 normal-case">{ex.stmt.id}</span>}
          </div>
          <div className="px-2 py-1.5">
            {ex.stmt ? (
              <>
                <div className="text-xs text-slate-700 truncate">{ex.stmt.desc}</div>
                <div className={`text-sm font-semibold num mt-0.5 ${ex.type==='AMOUNT_MISMATCH' ? 'text-amber-700 bg-amber-50 rounded px-1 -mx-1 inline-block' : 'text-slate-900'}`}>{fmtMoney(ex.stmt.amount)} <span className="text-xs text-slate-500 font-normal">USD</span></div>
                <div className="text-xs text-slate-500 num mt-0.5">{fmtTs(ex.stmt.ts)}</div>
              </>
            ) : (
              <div className="text-xs text-slate-500 italic">— not found</div>
            )}
          </div>
        </div>
      </div>

      {ex.type === 'AMOUNT_MISMATCH' && (
        <div className="mx-2.5 mb-2 px-2 py-1 bg-amber-50 border border-amber-200 rounded text-xs text-amber-800 flex items-center gap-1.5">
          <Icon.Warn className="w-3 h-3"/>
          <span>Δ <span className="num font-semibold">{fmtMoney(ex.diff)} USD</span> — ledger exceeds statement by {fmtMoney(ex.diff)}.</span>
        </div>
      )}

      <div className="px-2.5 pb-2 flex items-center gap-1.5 flex-wrap">
        {ex.type === 'UNMATCHED_LEDGER' && <>
          <Btn variant="secondary" size="xs"><Icon.Link className="w-3 h-3"/>Link to statement</Btn>
          <Btn variant="secondary" size="xs">Write off</Btn>
          <Btn variant="ghost" size="xs" className="text-slate-500">Mark in-flight</Btn>
        </>}
        {ex.type === 'UNMATCHED_STATEMENT' && <>
          <Btn variant="secondary" size="xs"><Icon.Link className="w-3 h-3"/>Link to ledger</Btn>
          <Btn variant="secondary" size="xs"><Icon.Plus className="w-3 h-3"/>Create entry</Btn>
          <Btn variant="ghost" size="xs" className="text-slate-500">Ignore</Btn>
        </>}
        {ex.type === 'AMOUNT_MISMATCH' && <>
          <Btn variant="secondary" size="xs">Adjust ledger</Btn>
          <Btn variant="secondary" size="xs">Accept variance</Btn>
          <Btn variant="ghost" size="xs" className="text-slate-500">Escalate</Btn>
        </>}
        <span className="ml-auto text-xs text-slate-500 font-mono">SLA: 24h</span>
      </div>
    </div>
  );
};

/* ---------- Route-labelled section wrapper ---------- */
const RouteSection = ({ route, label, children }) => (
  <section className="border-b border-slate-200">
    <div className="bg-slate-100/70 px-4 py-1.5 border-b border-slate-200 flex items-center gap-2 sticky top-0 z-10">
      <span className="font-mono text-xs text-slate-700 bg-white border border-slate-200 rounded px-1.5 py-0.5">{route}</span>
      <span className="text-xs text-slate-500">{label}</span>
    </div>
    {children}
  </section>
);

/* ---------- Root App ---------- */
const App = () => {
  // Persist a "current" navigation route for the shell, but render all 4 screens stacked.
  const [route, setRoute] = useState({ screen: 'wallets' });

  return (
    <div className="min-h-screen flex flex-col" style={{ minWidth: 1280 }}>
      {/* The single, persistent shell. TopBar breadcrumbs reflect the route the user last clicked in the sidebar. */}
      <div className="flex flex-1 min-h-screen">
        <Sidebar route={route} setRoute={setRoute}/>
        <div className="flex-1 flex flex-col min-w-0">
          <TopBar route={route} setRoute={setRoute}/>
          <main className="flex-1 overflow-auto">
            <RouteSection route="/wallets" label="Default view — all wallets for current operator">
              <WalletsScreen onOpen={(id) => {
                setRoute({ screen:'wallet-detail', id });
                const el = document.getElementById('route-detail');
                const main = el?.closest('main');
                if (el && main) main.scrollTo({ top: el.offsetTop, behavior: 'smooth' });
              }}/>
            </RouteSection>

            <div id="route-detail"/>
            <RouteSection route="/wallets/:id" label={`Showing wlt_8f3a1c — usr_42061_main`}>
              <WalletDetailScreen id={route.screen==='wallet-detail' ? route.id : 'wlt_8f3a1c'} onBack={() => setRoute({ screen:'wallets' })}/>
            </RouteSection>

            <RouteSection route="/ledger" label="All double-entry transactions">
              <LedgerScreen/>
            </RouteSection>

            <RouteSection route="/reconciliation/runs/:id" label="run_2026_05_20_08:00 — Stripe payouts ↔ liability:wlt_8f3a1c">
              <ReconScreen/>
            </RouteSection>
          </main>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
