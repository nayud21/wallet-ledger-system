<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MyWallet — Notifications</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Geist', 'system-ui', 'ui-sans-serif'],
          mono: ['Geist Mono', 'ui-monospace', 'monospace'],
        },
      }
    }
  }
</script>
<style>
  html, body { background: #f8fafc; }
  body { font-family: 'Geist', system-ui, ui-sans-serif, sans-serif; color: #0f172a; -webkit-font-smoothing: antialiased; }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  :where(button, a, input, select, textarea):focus { outline: none; }
  :where(button, a, input, select, textarea):focus-visible {
    outline: 2px solid #4f46e5;
    outline-offset: 2px;
    border-radius: 6px;
  }

  /* ----- Success screen animations ----- */
  @keyframes circle-pop {
    0%   { transform: scale(0); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes ring-ping {
    0%   { transform: scale(0.8); opacity: 0.55; }
    100% { transform: scale(2.2); opacity: 0; }
  }
  @keyframes check-draw {
    0%   { stroke-dashoffset: 36; }
    100% { stroke-dashoffset: 0; }
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }

  .success-circle    { animation: circle-pop 360ms cubic-bezier(.2,.9,.3,1.2) both; }
  .success-ring      { animation: ring-ping 900ms cubic-bezier(.2,.7,.2,1) 120ms both; }
  .success-check     { stroke-dasharray: 36; stroke-dashoffset: 36; animation: check-draw 360ms ease-out 240ms forwards; }
  .fade-up-1         { animation: fade-up 320ms ease-out 200ms both; }
  .fade-up-2         { animation: fade-up 320ms ease-out 280ms both; }
  .fade-up-3         { animation: fade-up 320ms ease-out 360ms both; }
  .fade-up-4         { animation: fade-up 320ms ease-out 440ms both; }

  /* ----- Toast animations ----- */
  @keyframes toast-in {
    from { transform: translateY(-100%); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  @keyframes toast-out {
    from { transform: translateY(0); opacity: 1; }
    to   { transform: translateY(-100%); opacity: 0; }
  }
  .toast-enter { animation: toast-in 200ms ease-out both; }
  .toast-exit  { animation: toast-out 150ms ease-in both; }

  @keyframes progress {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }
  .progress-fill {
    transform-origin: left center;
    animation: progress var(--toast-dur, 4000ms) linear forwards;
  }
  .progress-paused .progress-fill { animation-play-state: paused; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ---------- Btn primitive ---------- */
const Btn = ({ variant='primary', size='md', children, className='', ...rest }) => {
  const sizes = {
    sm: 'h-9 px-3 text-sm',
    md: 'h-10 px-4 text-sm',
    lg: 'h-11 px-5 text-[15px]',
  };
  const variants = {
    primary:   'bg-indigo-600 text-white hover:bg-indigo-700 border border-indigo-600',
    secondary: 'bg-white text-slate-700 hover:bg-slate-50 border border-slate-200',
    outline:   'bg-white text-slate-700 hover:bg-slate-50 border border-slate-300',
    danger:    'bg-rose-600 text-white hover:bg-rose-700 border border-rose-600',
    warn:      'bg-amber-500 text-white hover:bg-amber-600 border border-amber-500',
    ghost:     'bg-transparent text-slate-600 hover:bg-slate-100 border border-transparent',
  };
  return (
    <button className={`inline-flex items-center justify-center gap-1.5 whitespace-nowrap rounded-lg font-medium transition-colors ${sizes[size]} ${variants[variant]} ${className}`} {...rest}>
      {children}
    </button>
  );
};

/* ---------- Component 1: Send Success Screen ---------- */
const SendSuccessScreen = ({ animationKey, onSendAgain, onDashboard, payload }) => (
  <div className="max-w-lg w-full mx-auto fade-up-1" key={animationKey}>
    {/* Step indicator (so it reads as "Step 3 of 3") */}
    <div className="text-center mb-1">
      <div className="text-[11px] uppercase tracking-wider text-slate-500 font-medium">Step 3 of 3</div>
      <div className="text-xl font-semibold tracking-tight mt-1">Success</div>
    </div>
    <div className="flex items-center justify-center gap-2 mb-6">
      <div className="w-2.5 h-2.5 rounded-full bg-indigo-600"/>
      <div className="h-px w-8 bg-indigo-600"/>
      <div className="w-2.5 h-2.5 rounded-full bg-indigo-600"/>
      <div className="h-px w-8 bg-indigo-600"/>
      <div className="w-2.5 h-2.5 rounded-full bg-emerald-600"/>
    </div>

    <div className="bg-white border border-slate-200 rounded-xl p-7 sm:p-8">
      {/* Animated check */}
      <div className="flex justify-center mb-5">
        <div className="relative w-16 h-16">
          <span className="absolute inset-0 rounded-full bg-emerald-500 success-ring"/>
          <div className="success-circle absolute inset-0 rounded-full bg-emerald-600 grid place-items-center">
            <svg className="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
              <path className="success-check" d="M5 12.5l4.5 4.5L19 7.5"/>
            </svg>
          </div>
        </div>
      </div>

      {/* Title + subtitle */}
      <div className="text-center mb-6 fade-up-1">
        <div className="text-xl font-semibold tracking-tight text-slate-900">Transfer Sent</div>
        <div className="text-sm text-slate-500 mt-1.5">Your transfer has been processed successfully.</div>
      </div>

      {/* Summary box */}
      <div className="rounded-xl bg-slate-50 border border-slate-200 divide-y divide-slate-200 fade-up-2">
        <SumRow label="Amount">
          <span className="text-base font-bold num text-emerald-600">{payload.amountStr} <span className="text-xs text-emerald-600/80 font-medium font-mono">{payload.currency}</span></span>
        </SumRow>
        <SumRow label="To">
          <span className="font-mono text-sm text-slate-800 truncate block max-w-[220px]" title={payload.to}>{payload.to}</span>
        </SumRow>
        <SumRow label="From">
          <div className="text-right">
            <div className="text-sm font-medium text-slate-800">{payload.fromLabel}</div>
            <div className="text-[11px] text-slate-500 num">{payload.fromAvailable} available</div>
          </div>
        </SumRow>
        <SumRow label="Reference">
          <span className="font-mono text-[12px] text-slate-700">{payload.ref}</span>
        </SumRow>
        <SumRow label="Time">
          <span className="text-sm text-slate-700 num">{payload.time}</span>
        </SumRow>
      </div>

      {/* Buttons */}
      <div className="grid grid-cols-2 gap-2 mt-6 fade-up-3">
        <Btn variant="outline" size="lg" onClick={onSendAgain}>Send Again</Btn>
        <Btn variant="primary" size="lg" onClick={onDashboard}>Back to Dashboard</Btn>
      </div>

      {/* Footer tip */}
      <div className="text-center text-[11px] text-slate-500 mt-4 fade-up-4">
        A receipt has been emailed to <span className="text-slate-700">john.doe@example.com</span>.
      </div>
    </div>
  </div>
);

const SumRow = ({ label, children }) => (
  <div className="flex items-center justify-between px-4 py-3">
    <span className="text-[11px] uppercase tracking-wider text-slate-500 font-medium">{label}</span>
    <div className="text-right min-w-0">{children}</div>
  </div>
);

/* ---------- Component 2: Toast system ---------- */
const ToastIcons = {
  success: (p) => (
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <path d="M3 8.5l3.5 3.5L13 4.5"/>
    </svg>
  ),
  error: (p) => (
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" {...p}>
      <path d="M4 4l8 8M12 4l-8 8"/>
    </svg>
  ),
  warning: (p) => (
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <path d="M8 4.5v4.5"/>
      <circle cx="8" cy="11.5" r=".6" fill="currentColor" stroke="none"/>
    </svg>
  ),
};

const ToastMeta = {
  success: { iconBg: 'bg-emerald-500', barBg: 'bg-indigo-600' },
  error:   { iconBg: 'bg-rose-600',    barBg: 'bg-rose-600' },
  warning: { iconBg: 'bg-amber-500',   barBg: 'bg-amber-500' },
};

let _toastId = 0;
const ToastHost = ({ toasts, dismiss }) => (
  <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 w-[320px] flex flex-col gap-2 pointer-events-none" aria-live="polite" aria-atomic="false">
    {toasts.map(t => (
      <ToastCard key={t.id} toast={t} onDismiss={() => dismiss(t.id)}/>
    ))}
  </div>
);

const ToastCard = ({ toast, onDismiss }) => {
  const Icon = ToastIcons[toast.kind];
  const meta = ToastMeta[toast.kind];
  const [exiting, setExiting] = useState(false);
  const [paused, setPaused] = useState(false);

  // Auto-dismiss timer
  useEffect(() => {
    if (toast.persistent) return;
    if (paused) return;
    const remaining = toast.endsAt - Date.now();
    if (remaining <= 0) {
      requestExit();
      return;
    }
    const t = setTimeout(() => requestExit(), remaining);
    return () => clearTimeout(t);
  }, [paused, toast.endsAt]);

  const requestExit = useCallback(() => {
    setExiting(true);
    setTimeout(onDismiss, 150);
  }, [onDismiss]);

  return (
    <div
      role="status"
      onMouseEnter={() => { setPaused(true); toast.endsAt = Date.now() + toast.duration; }}
      onMouseLeave={() => { setPaused(false); toast.endsAt = Date.now() + toast.duration; }}
      className={`pointer-events-auto w-full bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden ${exiting ? 'toast-exit' : 'toast-enter'} ${paused ? 'progress-paused' : ''}`}
    >
      <div className="flex items-start gap-3 px-3 py-2.5">
        <div className={`w-4 h-4 mt-0.5 rounded-full ${meta.iconBg} text-white grid place-items-center shrink-0`}>
          <Icon className="w-2.5 h-2.5"/>
        </div>
        <div className="flex-1 min-w-0">
          <div className="text-sm font-medium text-slate-900 leading-tight">{toast.title}</div>
          {toast.subtitle && <div className="text-xs text-slate-500 mt-0.5 truncate">{toast.subtitle}</div>}
        </div>
        <button
          onClick={requestExit}
          className="text-slate-400 hover:text-slate-700 shrink-0 -mr-1 -mt-0.5 w-6 h-6 grid place-items-center rounded hover:bg-slate-100"
          aria-label="Dismiss"
        >
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" className="w-3.5 h-3.5">
            <path d="M4 4l8 8M12 4l-8 8"/>
          </svg>
        </button>
      </div>
      {!toast.persistent && (
        <div className="h-[2px] bg-slate-100">
          <div
            className={`h-full ${meta.barBg} progress-fill`}
            style={{ '--toast-dur': `${toast.duration}ms` }}
          />
        </div>
      )}
    </div>
  );
};

/* ---------- Toast hook ---------- */
const useToasts = (max = 3) => {
  const [toasts, setToasts] = useState([]);

  const push = useCallback((t) => {
    const id = ++_toastId;
    const duration = t.duration ?? 4000;
    const next = {
      id,
      kind: t.kind ?? 'success',
      title: t.title,
      subtitle: t.subtitle,
      duration,
      endsAt: Date.now() + duration,
      persistent: !!t.persistent,
    };
    setToasts(prev => {
      const arr = [...prev, next];
      // keep newest at the bottom of the visible stack; drop oldest if over max
      return arr.slice(-max);
    });
  }, [max]);

  const dismiss = useCallback((id) => {
    setToasts(prev => prev.filter(t => t.id !== id));
  }, []);

  const clear = useCallback(() => setToasts([]), []);

  return { toasts, push, dismiss, clear };
};

/* ---------- Demo page ---------- */
const RouteLabel = ({ route, sub }) => (
  <div className="max-w-5xl mx-auto px-6 pt-10 pb-3 flex items-baseline gap-2">
    <span className="font-mono text-xs text-slate-400 bg-white border border-slate-200 rounded px-1.5 py-0.5">{route}</span>
    {sub && <span className="text-xs text-slate-400">{sub}</span>}
  </div>
);

const Demo = () => {
  const { toasts, push, dismiss, clear } = useToasts(3);
  const [animKey, setAnimKey] = useState(0);
  const [actionLog, setActionLog] = useState([]);

  const replayAnim = () => setAnimKey(k => k + 1);

  const presets = [
    { kind: 'success', title: 'Transfer sent',     subtitle: '$250.00 to wlt_70218a',                 label: 'Transfer sent' },
    { kind: 'success', title: 'Top-up received',   subtitle: '+$500.00 credited to USD Wallet',       label: 'Top-up received' },
    { kind: 'error',   title: 'Transfer failed',   subtitle: 'Insufficient balance.',                 label: 'Transfer failed' },
    { kind: 'error',   title: 'Wallet not found',  subtitle: 'Check the wallet ID and try again.',    label: 'Wallet not found' },
    { kind: 'warning', title: 'Verify your email', subtitle: 'Send limit reduced until verified.',    label: 'Warning (bonus)' },
  ];

  const log = (msg) => setActionLog(prev => [{ id: Date.now() + Math.random(), msg, t: new Date() }, ...prev].slice(0, 4));

  const payload = {
    amountStr: '$250.00',
    currency: 'USD',
    to: 'wlt_70218a3b91c44ed8a02f',
    fromLabel: 'Main USD',
    fromAvailable: '$11,910.53',
    ref: 'tx_4ab17c98',
    time: 'May 21, 2026 · 10:29 AM',
  };

  return (
    <>
      <ToastHost toasts={toasts} dismiss={dismiss}/>

      {/* Page intro */}
      <div className="max-w-5xl mx-auto px-6 pt-10 pb-2">
        <div className="text-[22px] font-semibold tracking-tight">Notifications</div>
        <div className="text-sm text-slate-500 mt-1">Two notification UI components for the MyWallet consumer app.</div>
      </div>

      {/* COMPONENT 1 — Success screen */}
      <RouteLabel route="/send · success" sub="Step 3 of 3 — replaces the Confirm step after a successful transfer"/>
      <section className="max-w-5xl mx-auto px-6 pb-2">
        <div className="grid grid-cols-1 lg:grid-cols-[1fr_280px] gap-4 items-start">
          <div className="bg-white border border-slate-200 rounded-2xl p-6 sm:p-10 flex justify-center" style={{ background: 'radial-gradient(1200px 300px at 50% -50px, #eef2ff 0%, transparent 70%), white' }}>
            <SendSuccessScreen
              animationKey={animKey}
              payload={payload}
              onSendAgain={() => { log('→ resetTo: Step 0 (Recipient)'); replayAnim(); push({ kind:'success', title:'Wizard reset', subtitle:'Back to Recipient step.' }); }}
              onDashboard={() => { log('→ navigate: /dashboard'); push({ kind:'success', title:'Returning to dashboard…' }); }}
            />
          </div>

          {/* Side notes */}
          <aside className="space-y-2">
            <div className="bg-white border border-slate-200 rounded-xl p-3 text-xs leading-relaxed">
              <div className="text-[10px] uppercase tracking-wider text-slate-500 font-medium mb-1.5">Demo controls</div>
              <div className="space-y-1.5">
                <Btn variant="secondary" size="sm" className="w-full" onClick={replayAnim}>↻ Replay animation</Btn>
                <Btn variant="outline" size="sm" className="w-full" onClick={() => { log('→ resetTo: Step 0'); replayAnim(); }}>Trigger Send Again</Btn>
                <Btn variant="outline" size="sm" className="w-full" onClick={() => log('→ navigate: /dashboard')}>Trigger Back to Dashboard</Btn>
              </div>
            </div>

            <div className="bg-white border border-slate-200 rounded-xl p-3 text-[11px] leading-relaxed text-slate-600">
              <div className="text-[10px] uppercase tracking-wider text-slate-500 font-medium mb-1.5">Action log</div>
              {actionLog.length === 0 && <div className="text-slate-400">Click an action to see routing…</div>}
              <div className="space-y-1 font-mono">
                {actionLog.map(e => (
                  <div key={e.id} className="flex gap-2">
                    <span className="text-slate-400 num shrink-0">{e.t.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' })}</span>
                    <span className="text-slate-700">{e.msg}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="bg-slate-50 border border-slate-200 rounded-xl p-3 text-[11px] text-slate-600 leading-relaxed">
              <div className="text-[10px] uppercase tracking-wider text-slate-500 font-medium mb-1.5">Spec notes</div>
              <ul className="space-y-1 list-disc list-inside marker:text-slate-400">
                <li>No close X — user must choose</li>
                <li>64px emerald check w/ ping ring</li>
                <li>Summary uses divide-y rows</li>
                <li>Receipt note for trust</li>
              </ul>
            </div>
          </aside>
        </div>
      </section>

      {/* COMPONENT 2 — Toast notifications */}
      <RouteLabel route="global · toasts" sub="Stacked top-center, max 3 visible, 8px gap, auto-dismiss 4s"/>
      <section className="max-w-5xl mx-auto px-6 pb-16">
        <div className="grid grid-cols-1 lg:grid-cols-[1fr_360px] gap-4 items-start">
          {/* Triggers */}
          <div className="bg-white border border-slate-200 rounded-2xl p-5">
            <div className="flex items-end justify-between mb-4">
              <div>
                <div className="text-base font-semibold tracking-tight">Try the toast variants</div>
                <div className="text-xs text-slate-500 mt-0.5">Hover a toast to pause its progress bar. Stack caps at 3 — older toasts get pushed out.</div>
              </div>
              <Btn variant="ghost" size="sm" onClick={clear}>Clear all</Btn>
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
              {presets.map((p, i) => (
                <button
                  key={i}
                  onClick={() => push(p)}
                  className="group flex items-center gap-3 p-3 border border-slate-200 rounded-xl hover:border-slate-300 hover:bg-slate-50 text-left transition-colors"
                >
                  <div className={`w-7 h-7 rounded-full grid place-items-center text-white shrink-0 ${ToastMeta[p.kind].iconBg}`}>
                    {p.kind==='success' && <ToastIcons.success className="w-3.5 h-3.5"/>}
                    {p.kind==='error'   && <ToastIcons.error   className="w-3.5 h-3.5"/>}
                    {p.kind==='warning' && <ToastIcons.warning className="w-3.5 h-3.5"/>}
                  </div>
                  <div className="min-w-0 flex-1">
                    <div className="text-sm font-medium text-slate-900 truncate">{p.title}</div>
                    <div className="text-xs text-slate-500 truncate">{p.subtitle}</div>
                  </div>
                  <span className="text-[10px] uppercase tracking-wider text-slate-400 font-medium font-mono">{p.kind}</span>
                </button>
              ))}
            </div>

            <div className="mt-4 pt-4 border-t border-slate-100 flex items-center gap-2 flex-wrap">
              <span className="text-[11px] text-slate-500 font-medium mr-1">Quick fire:</span>
              <Btn variant="outline" size="sm" onClick={() => { presets.slice(0,3).forEach((p, i) => setTimeout(() => push(p), i*150)); }}>
                Fire 3 in sequence
              </Btn>
              <Btn variant="outline" size="sm" onClick={() => { presets.forEach((p, i) => setTimeout(() => push(p), i*120)); }}>
                Overflow stack (5)
              </Btn>
              <Btn variant="outline" size="sm" onClick={() => push({ kind:'success', title:'Persistent toast', subtitle:'Doesn\u2019t auto-dismiss — close manually.', persistent:true })}>
                Persistent
              </Btn>
            </div>
          </div>

          {/* Spec card */}
          <aside className="bg-slate-50 border border-slate-200 rounded-2xl p-4 text-[12px] leading-relaxed text-slate-600">
            <div className="text-[10px] uppercase tracking-wider text-slate-500 font-medium mb-2">Spec</div>
            <dl className="space-y-1.5">
              <SpecItem k="Position">Fixed, top-center, z-50</SpecItem>
              <SpecItem k="Width">320px</SpecItem>
              <SpecItem k="Stack">Max 3, 8px gap, oldest drops</SpecItem>
              <SpecItem k="Enter">translateY(-100%) → 0, 200ms ease-out</SpecItem>
              <SpecItem k="Exit">+ opacity 0, 150ms ease-in</SpecItem>
              <SpecItem k="Progress">100% → 0% over 4s</SpecItem>
              <SpecItem k="Success bar">indigo-600</SpecItem>
              <SpecItem k="Error bar">rose-600</SpecItem>
              <SpecItem k="Pause">on hover</SpecItem>
              <SpecItem k="a11y">role=status, aria-live=polite</SpecItem>
            </dl>
          </aside>
        </div>
      </section>

      <div className="h-12"/>
    </>
  );
};

const SpecItem = ({ k, children }) => (
  <div className="flex items-baseline gap-2">
    <dt className="w-24 shrink-0 text-[10px] uppercase tracking-wider text-slate-500 font-medium">{k}</dt>
    <dd className="text-[12px] text-slate-700 flex-1">{children}</dd>
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
