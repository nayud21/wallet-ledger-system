<style>
  html, body { background: #f8fafc; }

  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  :where(button, a, input, select, textarea):focus { outline: none; }
  :where(button, a, input, select, textarea):focus-visible {
    outline: 2px solid #4f46e5;
    outline-offset: 2px;
    border-radius: 6px;
  }
  /* ===== Reused keyframes ===== */
  @keyframes circle-pop {
    0%   { transform: scale(0); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes ring-ping {
    0%   { transform: scale(0.8); opacity: 0.55; }
    100% { transform: scale(2.2); opacity: 0; }
  }
  @keyframes check-draw {
    0%   { stroke-dashoffset: 36; }
    100% { stroke-dashoffset: 0; }
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }
  .success-circle    { animation: circle-pop 360ms cubic-bezier(.2,.9,.3,1.2) both; }
  .success-ring      { animation: ring-ping 900ms cubic-bezier(.2,.7,.2,1) 120ms both; }
  .success-check     { stroke-dasharray: 36; stroke-dashoffset: 36; animation: check-draw 360ms ease-out 240ms forwards; }
  .fade-up-1         { animation: fade-up 320ms ease-out 200ms both; }
  .fade-up-2         { animation: fade-up 320ms ease-out 280ms both; }
  .fade-up-3         { animation: fade-up 320ms ease-out 360ms both; }
  .fade-up-4         { animation: fade-up 320ms ease-out 440ms both; }
  .fade-up-step      { animation: fade-up 220ms cubic-bezier(.2,.7,.2,1) both; }

  /* ===== Toast ===== */
  @keyframes toast-in  { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes toast-out { from { transform: translateY(0); opacity: 1; }     to { transform: translateY(-100%); opacity: 0; } }
  .toast-enter { animation: toast-in 200ms ease-out both; }
  .toast-exit  { animation: toast-out 150ms ease-in both; }
  @keyframes progress { from { transform: scaleX(1); } to { transform: scaleX(0); } }
  .progress-fill { transform-origin: left center; animation: progress var(--toast-dur, 4000ms) linear forwards; }
  .progress-paused .progress-fill { animation-play-state: paused; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
</style>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ================== Helpers ================== */
const fmtMoney = (n, currency = 'USD') => {
  if (currency === 'VND') return `₫${new Intl.NumberFormat('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(Math.abs(n))}`;
  const sym = { USD: '$', EUR: '€', GBP: '£' }[currency] ?? '';
  return `${sym}${new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(Math.abs(n))}`;
};
const uuid = () => {
  const hex = (n) => Math.floor(Math.random()*16**n).toString(16).padStart(n,'0');
  return `${hex(8)}-${hex(4)}-4${hex(3)}-${(8+Math.floor(Math.random()*4)).toString(16)}${hex(3)}-${hex(12)}`;
};
const formatNow = () => {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const d = new Date();
  const pad = (x) => String(x).padStart(2,'0');
  const h = d.getHours();
  const hh = h % 12 === 0 ? 12 : h % 12;
  const ampm = h < 12 ? 'AM' : 'PM';
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} · ${hh}:${pad(d.getMinutes())} ${ampm}`;
};

/* ================== Primitives ================== */
const Btn = ({ variant='primary', size='md', children, className='', ...rest }) => {

const WALLETS = [

/* ================== Toast system ================== */
const ToastIcons = {
  success: (p)=>(<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 8.5l3.5 3.5L13 4.5"/></svg>),
  error:   (p)=>(<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" {...p}><path d="M4 4l8 8M12 4l-8 8"/></svg>),
  warning: (p)=>(<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M8 4.5v4.5"/><circle cx="8" cy="11.5" r=".6" fill="currentColor" stroke="none"/></svg>),
};
const ToastMeta = {
  success: { iconBg: 'bg-emerald-500', barBg: 'bg-indigo-600' },
  error:   { iconBg: 'bg-rose-600',    barBg: 'bg-rose-600' },
  warning: { iconBg: 'bg-amber-500',   barBg: 'bg-amber-500' },
};
let _toastId = 0;
const useToasts = (max = 3) => {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((t) => {
    const id = ++_toastId;
    const duration = t.duration ?? 4000;
    const next = { id, kind: t.kind ?? 'success', title: t.title, subtitle: t.subtitle, duration, endsAt: Date.now() + duration };
    setToasts(prev => [...prev, next].slice(-max));
  }, [max]);
  const dismiss = useCallback((id) => setToasts(prev => prev.filter(t => t.id !== id)), []);
  return { toasts, push, dismiss };
};
const ToastCard = ({ toast, onDismiss }) => {
  const I = ToastIcons[toast.kind];
  const meta = ToastMeta[toast.kind];
  const [exiting, setExiting] = useState(false);
  const [paused, setPaused] = useState(false);
  useEffect(() => {
    if (paused) return;
    const remaining = toast.endsAt - Date.now();
    if (remaining <= 0) { req(); return; }
    const t = setTimeout(req, remaining);
    return () => clearTimeout(t);
    function req() { setExiting(true); setTimeout(onDismiss, 150); }
  }, [paused, toast.endsAt]);
  return (
    <div
      role="status"
      onMouseEnter={()=>{ setPaused(true); toast.endsAt = Date.now() + toast.duration; }}
      onMouseLeave={()=>{ setPaused(false); toast.endsAt = Date.now() + toast.duration; }}
      className={`pointer-events-auto w-full bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden ${exiting ? 'toast-exit' : 'toast-enter'} ${paused ? 'progress-paused' : ''}`}
    >
      <div className="flex items-start gap-3 px-3 py-2.5">
        <div className={`w-4 h-4 mt-0.5 rounded-full ${meta.iconBg} text-white grid place-items-center shrink-0`}>
          <I className="w-2.5 h-2.5"/>
        </div>
        <div className="flex-1 min-w-0">
          <div className="text-sm font-medium text-slate-900 leading-tight">{toast.title}</div>
          {toast.subtitle && <div className="text-xs text-slate-500 mt-0.5 truncate">{toast.subtitle}</div>}
        </div>
        <button onClick={() => { setExiting(true); setTimeout(onDismiss, 150); }} className="text-slate-400 hover:text-slate-700 -mr-1 -mt-0.5 w-6 h-6 grid place-items-center rounded hover:bg-slate-100" aria-label="Dismiss"><Icon.X className="w-3.5 h-3.5"/></button>
      </div>
      <div className="h-[2px] bg-slate-100">
        <div className={`h-full ${meta.barBg} progress-fill`} style={{ '--toast-dur': `${toast.duration}ms` }}/>
      </div>
    </div>
  );
};
const ToastHost = ({ toasts, dismiss }) => (

/* ================== Step dots ================== */
const StepDots = ({ step, total = 3 }) => (
  <div className="flex items-center justify-center gap-2 mb-6">
    {Array.from({ length: total }).map((_, i) => {
      const filled = i <= step;
      const isCurrent = i === step;
      return (
        <React.Fragment key={i}>
          <div className={`rounded-full transition-all ${filled ? (i === total-1 && step >= total-1 ? 'bg-emerald-600' : 'bg-indigo-600') : 'bg-slate-200'} ${isCurrent ? 'w-3 h-3' : 'w-2.5 h-2.5'}`}/>
          {i < total-1 && <div className={`h-px w-8 transition-colors ${i < step ? 'bg-indigo-600' : 'bg-slate-200'}`}/>}
        </React.Fragment>
      );
    })}
  </div>
);

/* ================== STEP 0 — Select wallet ================== */
const Step0Select = ({ wallets, selectedId, onSelect, onContinue }) => {

    <div className="fade-up-step">

              >
                <div className={`w-10 h-10 rounded-lg grid place-items-center font-mono text-[11px] font-semibold shrink-0 ${w.currency==='USD' ? 'bg-indigo-100 text-indigo-700' : w.currency==='VND' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-700'}`}>
                  {w.currency}
                </div>
                <div className="min-w-0 flex-1">
                  <div className="flex items-center gap-2">
                    <span className="text-sm font-medium text-slate-900">{w.label}</span>
                    <span className={`inline-flex items-center gap-1 text-[10px] font-medium px-1.5 py-0.5 rounded ${frozen ? 'bg-slate-100 text-slate-600' : 'bg-emerald-50 text-emerald-700'}`}>

/* ================== STEP 1 — Amount + ref + (hidden) idempotency ================== */
const Step1Amount = ({ wallet, amount, setAmount, externalRef, setExternalRef, idempotencyKey, setIdempotencyKey, method, setMethod, showIdemDebug, setShowIdemDebug, onBack, onContinue }) => {
  const amountNum = parseFloat(amount) || 0;
  const presets = PRESETS[wallet.currency] || PRESETS.USD;

  // Validation
  const dec = (amount.split('.')[1] || '').length;
  const tooManyDecimals = dec > 2;
  const isNegative = amount.startsWith('-');
  const isZero = amountNum <= 0 && amount.length > 0;
  const aboveCap = amountNum > 1_000_000;

  const error =
    isNegative ? 'Amount must be positive.' :
    tooManyDecimals ? 'Use at most 2 decimal places.' :
    aboveCap ? `Maximum single top-up is ${fmtMoney(1_000_000, wallet.currency)}.` :
    null;

  const canContinue = amountNum > 0 && !error;

  return (
    <div className="fade-up-step space-y-4">
      <Card className="p-5">
        <Field label="From">
          <div className="h-10 px-3 bg-slate-50 border border-slate-200 rounded-lg flex items-center gap-3">
            <div className={`w-6 h-6 rounded grid place-items-center font-mono text-[10px] font-semibold ${wallet.currency==='USD' ? 'bg-indigo-100 text-indigo-700' : wallet.currency==='VND' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-700'}`}>{wallet.currency}</div>

            </div>

          </div>
        </Field>

        <div className="mt-4">
          <Field label="Amount" hint="positive · up to 2 decimal places" error={error}>
            <div className="relative">
              <input
                inputMode="decimal"
                value={amount}
                onChange={(e) => {
                  // allow digits, one dot, no leading negative
                  let v = e.target.value.replace(/[^\d.]/g, '');
                  const parts = v.split('.');
                  if (parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
                  setAmount(v);
                }}
                placeholder="0.00"
                className={`h-14 w-full pl-3 pr-20 text-2xl font-semibold num bg-white border rounded-lg focus:ring-2 ${error ? 'border-rose-300 focus:border-rose-500 focus:ring-rose-100 text-rose-700' : 'border-slate-200 focus:border-indigo-500 focus:ring-indigo-100 text-slate-900'}`}
              />
              <div className="absolute right-3 top-1/2 -translate-y-1/2 flex items-center gap-1.5 text-slate-500">
                <span className="text-xs font-medium font-mono tracking-wider bg-slate-100 px-1.5 py-0.5 rounded">{wallet.currency}</span>
              </div>
            </div>
          </Field>

          <div className="mt-2 grid grid-cols-4 gap-1.5">
            {presets.map(v => (
              <button key={v} type="button" onClick={() => setAmount(String(v))} className={`h-8 rounded-md border text-xs font-medium num transition-colors ${parseFloat(amount)===v ? 'border-indigo-300 bg-indigo-50 text-indigo-700' : 'border-slate-200 bg-white text-slate-700 hover:bg-slate-50'}`}>
                {wallet.currency==='VND' ? (v >= 1_000_000 ? `${v/1_000_000}M` : `${v/1000}k`) : `${fmtMoney(v, wallet.currency)}`}
              </button>
            ))}
          </div>
        </div>

        <div className="mt-4">
          <Field label="External reference" optional hint="payment receipt ID, etc.">
            <TextInput
              value={externalRef}
              onChange={e=>setExternalRef(e.target.value)}
              placeholder="e.g. stripe_pi_3OAB29Hk or BANK-2026-05-21-7714"
              maxLength={64}
              className="font-mono text-[12.5px]"
            />
          </Field>
        </div>

        {/* Payment method (visual, for prototype completeness) */}
        <div className="mt-4">
          <Field label="Payment method">
            <div className="grid grid-cols-3 gap-2">
              {PAYMENT_METHODS.map(m => {
                const I = m.icon;
                const active = method === m.id;
                return (
                  <button key={m.id} type="button" onClick={()=>setMethod(m.id)} className={`text-left border rounded-lg p-2.5 transition-colors ${active ? 'border-indigo-500 ring-2 ring-indigo-100 bg-indigo-50/40' : 'border-slate-200 hover:border-slate-300 hover:bg-slate-50'}`}>
                    <div className="flex items-center justify-between">
                      <div className={`w-6 h-6 rounded grid place-items-center ${m.accent}`}>
                        <I className="w-3.5 h-3.5"/>
                      </div>
                      {active && <div className="w-4 h-4 rounded-full bg-indigo-600 grid place-items-center"><Icon.Check className="w-2.5 h-2.5 text-white"/></div>}
                    </div>
                    <div className="text-[12px] font-medium text-slate-800 mt-1.5">{m.label}</div>
                    <div className="text-[10px] text-slate-500 truncate">{m.sub}</div>
                  </button>
                );
              })}
            </div>
          </Field>
        </div>

        {/* Hidden idempotency key — debug peek */}
        <div className="mt-4 pt-3 border-t border-slate-100">
          <button onClick={() => setShowIdemDebug(s => !s)} className="text-[11px] text-slate-500 hover:text-slate-800 inline-flex items-center gap-1">
            <Icon.Bug className="w-3.5 h-3.5"/>

                <Icon.Refresh className="w-3.5 h-3.5"/>
              </button>
            </div>
          )}
        </div>
      </Card>

      <div className="grid grid-cols-2 gap-2">
        <Btn variant="outline" size="lg" onClick={onBack}><Icon.ArrowLeft className="w-4 h-4"/>Back</Btn>
        <Btn variant="primary" size="lg" disabled={!canContinue} onClick={onContinue}>Review <Icon.ArrowRight className="w-4 h-4"/></Btn>

/* ================== TOP-UP PAGE ================== */
const TopUpPage = ({ initialWalletId, onNavigate, pushToast }) => {
  const [step, setStep] = useState(0); // 0 select, 1 amount, 2 confirm, 3 success
  const [walletId, setWalletId] = useState(initialWalletId || (WALLETS.length === 1 ? WALLETS[0].id : ''));
  const [amount, setAmount] = useState('');
  const [externalRef, setExternalRef] = useState('');
  const [idempotencyKey, setIdempotencyKey] = useState(() => uuid());
  const [method, setMethod] = useState('stripe');
  const [showIdemDebug, setShowIdemDebug] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [lastError, setLastError] = useState(null);
  const [simulateFailure, setSimulateFailure] = useState(false);
  const [completedAt, setCompletedAt] = useState('');

  // Pre-select if single wallet (already handled above), or if route param
  useEffect(() => {
    const eligible = WALLETS.filter(w => w.status === 'ACTIVE');
    if (!walletId && eligible.length === 1) {
      setWalletId(eligible[0].id);
      // could auto-advance, but spec says "Pre-select if only 1 wallet" — staying on step 0 with pre-selection.
    }
  }, []);

  const wallet = WALLETS.find(w => w.id === walletId) || WALLETS[0];

  const reset = (preserveWallet = false) => {
    setStep(0);
    setAmount('');
    setExternalRef('');
    setIdempotencyKey(uuid()); // regenerate per spec
    setLastError(null);
    setSimulateFailure(false);
    setSubmitting(false);
    if (!preserveWallet) setWalletId(initialWalletId || (WALLETS.length === 1 ? WALLETS[0].id : ''));
  };

  const handleConfirm = () => {
    setSubmitting(true);
    setLastError(null);
    // Mock POST /api/v1/wallets/top-up with 1s delay
    setTimeout(() => {
      if (simulateFailure) {
        // Pick a deterministic-feeling server error
        const errors = [
          'Payment authorization declined by issuer.',
          'Daily top-up limit reached for this method.',
          'Service temporarily unavailable. Please retry.',
        ];
        const msg = errors[Math.floor(Math.random() * errors.length)];
        setSubmitting(false);
        setLastError(msg);
        // Per spec: error toast + stay on confirm step
        pushToast({ kind: 'error', title: 'Top-up failed', subtitle: msg });
        return;
      }
      setSubmitting(false);
      setCompletedAt(formatNow());
      setStep(3);
      pushToast({
        kind: 'success',
        title: 'Top-up received',
        subtitle: `+${fmtMoney(parseFloat(amount), wallet.currency)} credited to ${wallet.label}`,
      });
    }, 1000);
  };

  const stepLabels = ['Select wallet', 'Enter amount', 'Review & confirm', 'Success'];

  return (
    <div className="max-w-md mx-auto px-4 pt-6 pb-12">
      {/* Page header */}
      <div className="flex items-center mb-1">
        <button onClick={() => step > 0 && step < 3 ? setStep(s => s - 1) : onNavigate('/dashboard')} className="-ml-2 h-8 px-2 rounded-md text-slate-600 hover:bg-slate-100 inline-flex items-center gap-1.5 text-sm">
          <Icon.ArrowLeft className="w-4 h-4"/>
          {step > 0 && step < 3 ? 'Previous step' : 'Cancel'}
        </button>
        <div className="ml-auto text-[11px] text-slate-400 font-mono">/top-up{initialWalletId ? `?walletId=${initialWalletId}`:''}</div>
      </div>

      <div className="text-center mt-2 mb-1">
        <div className="text-[11px] uppercase tracking-wider text-slate-500 font-medium">{step < 3 ? `Step ${step+1} of 3` : 'Done'}</div>
        <div className="text-xl font-semibold tracking-tight mt-1">{stepLabels[step]}</div>
      </div>
      <StepDots step={step} total={3}/>

      {step === 0 && (
        <Step0Select
          wallets={WALLETS}
          selectedId={walletId}
          onSelect={setWalletId}
          onContinue={() => setStep(1)}
        />
      )}
      {step === 1 && (
        <Step1Amount
          wallet={wallet}
          amount={amount} setAmount={setAmount}
          externalRef={externalRef} setExternalRef={setExternalRef}
          idempotencyKey={idempotencyKey} setIdempotencyKey={setIdempotencyKey}
          method={method} setMethod={setMethod}
          showIdemDebug={showIdemDebug} setShowIdemDebug={setShowIdemDebug}
          onBack={() => setStep(0)}
          onContinue={() => setStep(2)}
        />
      )}
      {step === 2 && (
        <Step2Confirm
          wallet={wallet}
          amount={amount}
          externalRef={externalRef}
          idempotencyKey={idempotencyKey}
          method={method}
          submitting={submitting}
          lastError={lastError}
          simulateFailure={simulateFailure}
          onSimulateFailure={setSimulateFailure}
          onBack={() => setStep(1)}
          onConfirm={handleConfirm}
        />
      )}
      {step === 3 && (
        <SuccessScreen
          wallet={wallet}
          amount={amount}
          externalRef={externalRef}
          idempotencyKey={idempotencyKey}
          completedAt={completedAt}
          onTopUpAgain={() => reset(true)}
          onDashboard={() => onNavigate('/dashboard')}
        />
      )}
    </div>
  );
};

/* ================== App (mock router) ================== */
const App = () => {
  const { toasts, push, dismiss } = useToasts(3);
  // Mock route state mirroring the in-app router; in the real app this is React Router.
  const [route, setRoute] = useState({ path: '/top-up', query: { walletId: 'wlt_8f3a1c' } });

  const navigate = (url) => {
    const [path, qs] = url.split('?');
    const query = {};
    if (qs) qs.split('&').forEach(p => { const [k, v] = p.split('='); query[k] = decodeURIComponent(v || ''); });
    setRoute({ path, query });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  return (
    <>
      <ToastHost toasts={toasts} dismiss={dismiss}/>
      <AppBar onBack={() => navigate('/dashboard')}/>

      {/* Tiny prototype nav */}
      <div className="bg-white border-b border-slate-100">
        <div className="max-w-3xl mx-auto px-4 py-1.5 flex items-center gap-1 text-[11px]">
          <span className="text-slate-400 font-medium uppercase tracking-wider mr-1">Routes:</span>
          {[
            { p: '/dashboard',   l: 'Dashboard' },
            { p: '/top-up',      l: '/top-up' },
            { p: '/top-up?walletId=wlt_8f3a1c', l: '/top-up?USD' },
            { p: '/top-up?walletId=wlt_aa17d9', l: '/top-up?VND' },
            { p: '/send',        l: '/send (stub)' },
            { p: '/history',     l: '/history (stub)' },
          ].map(r => {
            const active = (r.p === '/dashboard' && route.path === '/dashboard')
              || (r.p.startsWith('/top-up') && route.path === '/top-up' && (
                  r.p === '/top-up'
                    ? !route.query.walletId
                    : decodeURIComponent(r.p.split('=')[1] || '') === route.query.walletId
                ))
              || (r.p === '/send' && route.path === '/send')
              || (r.p === '/history' && route.path === '/history');
            return (
              <button key={r.p} onClick={() => navigate(r.p)} className={`px-2 h-6 rounded font-mono transition-colors ${active ? 'bg-indigo-50 text-indigo-700' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'}`}>
                {r.l}
              </button>
            );
          })}
        </div>
      </div>

      <main>
        {route.path === '/dashboard' && <Dashboard onNavigate={navigate}/>}
        {route.path === '/top-up' && (
          <TopUpPage
            key={`${route.query.walletId || 'none'}-${route.path}`}
            initialWalletId={route.query.walletId}
            onNavigate={navigate}
            pushToast={push}
          />
        )}
        {route.path === '/send' && (
          <StubPage title="Send" body="The Send page lives here in the real app. Use the route bar above to jump back."/>
        )}
        {route.path === '/history' && (
          <StubPage title="History" body="The History page lives here in the real app. Use the route bar above to jump back."/>
        )}
      </main>
    </>
  );
};

const StubPage = ({ title, body }) => (
  <div className="max-w-md mx-auto px-4 pt-10 pb-12 text-center">
    <div className="text-[11px] uppercase tracking-wider text-slate-500 font-medium">Prototype stub</div>
    <div className="text-xl font-semibold tracking-tight mt-1">{title}</div>
    <div className="text-sm text-slate-500 mt-2">{body}</div>
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
