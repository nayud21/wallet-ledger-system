const Btn = ({ variant='primary', size='md', children, className='', ...rest }) => {
  const sizes = { xs:'h-7 px-2 text-xs', sm:'h-8 px-3 text-[13px]', md:'h-9 px-3.5 text-sm', lg:'h-10 px-4 text-sm' };
  const variants = {
    primary:   'bg-indigo-600 text-white hover:bg-indigo-700 active:bg-indigo-800 border border-indigo-700/40 shadow-sm shadow-indigo-600/20',
    secondary: 'bg-white text-slate-700 hover:bg-slate-50 hover:border-slate-300 border border-slate-200',
    outline:   'bg-transparent text-slate-700 hover:bg-white hover:border-slate-300 border border-slate-300',
    ghost:     'bg-transparent text-slate-600 hover:bg-slate-100 border border-transparent',
    onDark:    'bg-white/15 text-white hover:bg-white/25 border border-white/20 backdrop-blur',
    onDarkSolid:'bg-white text-indigo-700 hover:bg-indigo-50 border border-white shadow-sm',
    danger:    'bg-rose-600 text-white hover:bg-rose-700 border border-rose-700/40',
  };
  return (
    <button className={`inline-flex items-center justify-center gap-1.5 whitespace-nowrap rounded-lg font-medium transition-all ${sizes[size]} ${variants[variant]} ${className}`} {...rest}>
      {children}
    </button>
  );
};

    pending: 'bg-amber-50 text-amber-800 border border-amber-200/60',
    failed:  'bg-rose-50 text-rose-700 border border-rose-200/60',
    info:    'bg-indigo-50 text-indigo-700 border border-indigo-200/60',
  };
  const dots = { slate:'bg-slate-400', success:'bg-emerald-500', pending:'bg-amber-500', failed:'bg-rose-500', info:'bg-indigo-500' };
  return (
    <span className={`inline-flex items-center gap-1.5 px-2 h-5 rounded-full text-[11px] font-medium ${tones[tone]}`}>
      {dot && <span className={`w-1.5 h-1.5 rounded-full ${dots[tone]}`}/>}
      {children}
    </span>
  );
};

const fmtTime = (d) => {
  const pad = (x)=>String(x).padStart(2,'0');
  const h = d.getHours();
  const hh = h%12===0?12:h%12;
  const ampm = h<12?'AM':'PM';
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return { date:`${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`, time:`${hh}:${pad(d.getMinutes())} ${ampm}` };
};

/* ============ Cashflow LINE Chart (pure SVG) ============ */
const CashflowChart = ({ data }) => {
  const [hover, setHover] = useState(null);
  const wrapRef = useRef(null);
  const W = 720, H = 260;
  const pad = { l: 44, r: 20, t: 18, b: 30 };
  const innerW = W - pad.l - pad.r;
  const innerH = H - pad.t - pad.b;
  const max = Math.max(...data.flatMap(d => [d.income, d.expense]));
  const yTicks = 4;
  const tickStep = Math.ceil(max / yTicks / 100) * 100;
  const yMax = tickStep * yTicks;

  const stepX = innerW / (data.length - 1);
  const px = (i) => pad.l + stepX * i;
  const py = (v) => pad.t + innerH - (v / yMax) * innerH;

  // Path builders
  const pathLine = (key) => data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${px(i).toFixed(1)} ${py(d[key]).toFixed(1)}`).join(' ');
  const pathArea = (key) => `${pathLine(key)} L ${px(data.length-1).toFixed(1)} ${(pad.t + innerH).toFixed(1)} L ${px(0).toFixed(1)} ${(pad.t + innerH).toFixed(1)} Z`;

  return (
    <div className="relative" ref={wrapRef}>
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto block">
        <defs>
          <linearGradient id="incFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#10b981" stopOpacity="0.22"/>
            <stop offset="100%" stopColor="#10b981" stopOpacity="0"/>
          </linearGradient>
          <linearGradient id="expFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#f43f5e" stopOpacity="0.18"/>
            <stop offset="100%" stopColor="#f43f5e" stopOpacity="0"/>
          </linearGradient>
        </defs>

        {/* Y grid + labels */}
        {Array.from({ length: yTicks + 1 }).map((_, i) => {
          const y = pad.t + (innerH / yTicks) * i;
          const v = yMax - (tickStep * i);
          return (
            <g key={i}>
              <line x1={pad.l} y1={y} x2={W - pad.r} y2={y} stroke="#e5e7eb" strokeDasharray={i === yTicks ? '0' : '3 3'}/>
              <text x={pad.l - 8} y={y + 4} textAnchor="end" className="fill-slate-400" style={{ fontSize: 10, fontFamily: 'Geist Mono, monospace' }}>${fmtCompact(v)}</text>
            </g>
          );
        })}

        {/* Area fills */}
        <path d={pathArea('income')}  fill="url(#incFill)"/>
        <path d={pathArea('expense')} fill="url(#expFill)"/>

        {/* Lines */}
        <path d={pathLine('expense')} fill="none" stroke="#f43f5e" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        <path d={pathLine('income')}  fill="none" stroke="#10b981" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>

        {/* Hover guideline */}
        {hover !== null && (
          <line x1={px(hover)} x2={px(hover)} y1={pad.t} y2={pad.t + innerH} stroke="#94a3b8" strokeDasharray="3 3" strokeWidth="1"/>
        )}

        {/* Data dots */}
        {data.map((d, i) => {
          const isHover = hover === i;
          return (
            <g key={d.day}>
              {/* hit area */}
              <rect x={px(i) - stepX/2} y={pad.t} width={stepX} height={innerH} fill="transparent" onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)}/>
              {/* dots */}
              <circle cx={px(i)} cy={py(d.income)}  r={isHover ? 5 : 3} fill="#fff" stroke="#10b981" strokeWidth="2" className="transition-all"/>
              <circle cx={px(i)} cy={py(d.expense)} r={isHover ? 5 : 3} fill="#fff" stroke="#f43f5e" strokeWidth="2" className="transition-all"/>
              {/* x label */}
              <text x={px(i)} y={H - 10} textAnchor="middle" className={isHover ? 'fill-slate-900' : 'fill-slate-500'} style={{ fontSize: 11, fontWeight: isHover ? 600 : 500 }}>{d.day}</text>
            </g>
          );
        })}
      </svg>

      {/* Tooltip */}
      {hover !== null && (() => {
        const total = data.length;
        // Position tooltip percentage along visible width, then shift to keep on-screen
        const xPct = (px(hover) / W) * 100;
        const shift = hover === 0 ? '0%' : hover === total - 1 ? '-100%' : '-50%';
        return (
          <div
            className="absolute pointer-events-none bg-slate-900 text-white text-[11px] rounded-lg px-3 py-2 shadow-xl fade-up border border-white/5"
            style={{ left: `${xPct}%`, top: 4, transform: `translateX(${shift})`, minWidth: 150 }}
          >
            <div className="font-medium text-white mb-1">{data[hover].date}</div>
            <div className="flex items-center justify-between gap-3 num">
              <span className="flex items-center gap-1.5"><span className="w-1.5 h-1.5 rounded-full bg-emerald-400"/>Income</span>
              <span className="text-emerald-300">+${fmtUSD(data[hover].income)}</span>
            </div>
            <div className="flex items-center justify-between gap-3 num">
              <span className="flex items-center gap-1.5"><span className="w-1.5 h-1.5 rounded-full bg-rose-400"/>Expenses</span>
              <span className="text-rose-300">−${fmtUSD(data[hover].expense)}</span>
            </div>
            <div className="border-t border-white/10 mt-1.5 pt-1.5 flex items-center justify-between num">
              <span>Net</span>
              <span className={data[hover].income - data[hover].expense >= 0 ? 'text-emerald-300' : 'text-rose-300'}>
                {data[hover].income - data[hover].expense >= 0 ? '+' : '−'}${fmtUSD(Math.abs(data[hover].income - data[hover].expense))}
              </span>
            </div>
          </div>
        );
      })()}
    </div>
  );
};

const fmtSimpleDate = (d) => {
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const pad=(x)=>String(x).padStart(2,'0');
  const h=d.getHours(); const hh=h%12===0?12:h%12; const ampm=h<12?'AM':'PM';
  return { d:`${months[d.getMonth()]} ${d.getDate()}`, t:`${hh}:${pad(d.getMinutes())} ${ampm}` };
};

/* --- Sparkline (compact) --- */
const Spark = ({ data, color = '#10b981', height = 28, fill = false }) => {
  const W = 120, H = height;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const stepX = W / (data.length - 1);
  const path = data.map((v, i) => `${i === 0 ? 'M' : 'L'} ${(i * stepX).toFixed(1)} ${(H - ((v - min) / range) * (H - 4) - 2).toFixed(1)}`).join(' ');
  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="block" style={{ width: '100%', height }}>
      {fill && (
        <>
          <defs>
            <linearGradient id={`spfill-${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.35"/>
              <stop offset="100%" stopColor={color} stopOpacity="0"/>
            </linearGradient>
          </defs>
          <path d={`${path} L ${W} ${H} L 0 ${H} Z`} fill={`url(#spfill-${color.replace('#','')})`}/>
        </>
      )}
      <path d={path} fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
};

/* --- Balance trend chart --- */
const BalanceTrend = ({ w }) => {
  const [hover, setHover] = useState(null);
  const W = 720, H = 220;
  const pad = { l: 44, r: 12, t: 14, b: 22 };
  const innerW = W - pad.l - pad.r;
  const innerH = H - pad.t - pad.b;
  const data = w.spark;
  const min = Math.min(...data), max = Math.max(...data);
  const range = (max - min) || 1;
  const yPad = range * 0.08;
  const yMin = min - yPad, yMax = max + yPad;
  const stepX = innerW / (data.length - 1);
  const px = (i) => pad.l + stepX * i;
  const py = (v) => pad.t + innerH - ((v - yMin) / (yMax - yMin)) * innerH;
  const pathLine = data.map((v, i) => `${i===0?'M':'L'} ${px(i).toFixed(1)} ${py(v).toFixed(1)}`).join(' ');
  const pathArea = `${pathLine} L ${px(data.length-1).toFixed(1)} ${(pad.t+innerH).toFixed(1)} L ${px(0).toFixed(1)} ${(pad.t+innerH).toFixed(1)} Z`;
  const color = w.monthChange >= 0 ? '#10b981' : '#f43f5e';
  // value scaling for display
  const displayVal = (v) => w.currency === 'VND' ? `₫${(v * 100000).toLocaleString()}` : `${w.symbol}${(v * 100).toFixed(0)}`;

  return (
    <Card className="col-span-12 xl:col-span-7 p-4">
      <div className="flex items-start justify-between mb-3">
        <div>
          <div className="text-sm font-semibold tracking-tight text-slate-900">30-day balance trend</div>
          <div className="text-xs text-slate-500 mt-0.5">Apr 25 – May 25, 2026</div>
        </div>
        <div className="text-right">
          <div className={`text-base font-bold num ${w.monthChange >= 0 ? 'text-green-700' : 'text-red-600'}`}>
            {w.monthChange >= 0 ? '+' : ''}{(w.monthChange*100).toFixed(2)}%
          </div>
          <div className="text-xs text-slate-500">vs 30 days ago</div>
        </div>
      </div>

      <div className="relative">
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto block">
          <defs>
            <linearGradient id="trendFill" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.22"/>
              <stop offset="100%" stopColor={color} stopOpacity="0"/>
            </linearGradient>
          </defs>
          {/* Grid */}
          {[0,1,2,3,4].map(i => {
            const y = pad.t + (innerH/4)*i;
            const v = yMax - ((yMax-yMin)/4)*i;
            return (
              <g key={i}>
                <line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="#e5e7eb" strokeDasharray={i===4?'0':'3 3'}/>
                <text x={pad.l-8} y={y+4} textAnchor="end" className="fill-slate-400" style={{fontSize:10, fontFamily:'Geist Mono, monospace'}}>{displayVal(v)}</text>
              </g>
            );
          })}
          <path d={pathArea} fill="url(#trendFill)"/>
          <path d={pathLine} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          {/* Hover dots */}
          {data.map((v, i) => (
            <g key={i}>
              <rect x={px(i)-stepX/2} y={pad.t} width={stepX} height={innerH} fill="transparent" onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)}/>
              {hover===i && (
                <>
                  <line x1={px(i)} x2={px(i)} y1={pad.t} y2={pad.t+innerH} stroke="#94a3b8" strokeDasharray="3 3"/>
                  <circle cx={px(i)} cy={py(v)} r="5" fill="#fff" stroke={color} strokeWidth="2"/>
                </>
              )}
            </g>
          ))}
        </svg>
        {hover !== null && (
          <div className="absolute pointer-events-none bg-slate-900 text-white text-xs rounded-lg px-3 py-2 shadow-xl"
            style={{ left: `${(px(hover)/W)*100}%`, top: 4, transform: `translateX(${hover === 0 ? '0%' : hover === data.length-1 ? '-100%' : '-50%'})` }}>
            <div className="font-medium">Day {hover+1}</div>
            <div className="num text-slate-200">{displayVal(data[hover])}</div>
          </div>
        )}
      </div>
    </Card>
  );
};

          <p className="text-[14px] text-slate-500 mt-1">Monday, May 25, 2026 · You're up <span className="text-emerald-600 font-medium num">+$77.50</span> in the last 7 days.</p>
        </div>
        <div className="flex items-center gap-2 self-center">
          <Btn variant="secondary" size="md"><Icon.Filter className="w-3.5 h-3.5"/>Filter</Btn>
          <Btn variant="secondary" size="md"><Icon.Download className="w-3.5 h-3.5"/>Export</Btn>
          <Btn variant="primary" size="md"><Icon.Send className="w-3.5 h-3.5"/>New transfer</Btn>
        </div>
      </div>

      {/* Hero row: Wallet (cols 1-8) + Quick Actions (cols 9-12) */}
      <div className="grid grid-cols-12 gap-4">
        <HeroWallet hidden={hidden} onToggleHide={() => setHidden(h => !h)}/>
        <QuickActionsCard onNav={onNav}/>
      </div>

      {/* KPI row */}
      <div className="grid grid-cols-12 gap-4">
        {KPIS.map((k, i) => (
          <div key={i} className="col-span-12 sm:col-span-6 lg:col-span-3"><KpiCard k={k}/></div>
        ))}
      </div>

      {/* Cashflow line chart (left) + compact transactions panel (right) */}
      <div className="grid grid-cols-12 gap-4">
        <CashflowCard/>
        <TxnPanel/>
      </div>
    </div>
  );
};

/* ============ Stub pages for other routes ============ */
const StubPage = ({ title, body }) => (
  <div className="p-10">
    <div className="max-w-2xl mx-auto text-center mt-16">
      <div className="text-[11px] uppercase tracking-wider text-slate-500 font-medium">Prototype stub</div>
      <div className="text-[28px] font-semibold tracking-tight mt-2">{title}</div>
      <div className="text-sm text-slate-500 mt-3">{body}</div>
    </div>
  </div>
);

/* ============ App ============ */
const App = () => {
  const [route, setRoute] = useState('/wallets');
  return (
    <div className="min-h-screen flex" style={{ minWidth: 1200 }}>
      <Sidebar route={route} onNav={setRoute}/>
      <div className="flex-1 flex flex-col min-w-0">
        <TopBar/>
        <main className="flex-1 overflow-auto">
          {route === '/dashboard' && <Dashboard onNav={setRoute}/>}
          {route === '/wallets'   && <WalletsPage onNav={setRoute}/>}
          {route === '/send'      && <StubPage title="Send"      body="The Send wizard lives in its own prototype file."/>}
          {route === '/top-up'    && <StubPage title="Top Up"    body="The Top Up wizard lives in its own prototype file."/>}
          {route === '/exchange'  && <StubPage title="Exchange"  body="Currency exchange — coming soon in this prototype."/>}
          {route === '/cards'     && <StubPage title="Cards"     body="Card management — coming soon in this prototype."/>}
          {route === '/history'   && <StubPage title="History"   body="Use the transactions table on the Dashboard for now."/>}
        </main>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
