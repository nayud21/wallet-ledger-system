/* ---------- Helpers ---------- */
const fmtMoney = (n, currency = 'USD') => {
  const formatted = new Intl.NumberFormat('en-US', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2,
  }).format(Math.abs(n));
  if (currency === 'VND') return `₫${new Intl.NumberFormat('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(Math.abs(n))}`;
  return `$${formatted}`;
};

const fmtDate = (d) => {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const pad = (x) => String(x).padStart(2, '0');
  const h = d.getHours();
  const hh = h % 12 === 0 ? 12 : h % 12;
  const ampm = h < 12 ? 'AM' : 'PM';
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} · ${hh}:${pad(d.getMinutes())} ${ampm}`;
};

/* ---------- Primitives ---------- */
const Btn = ({ variant='primary', size='md', children, className='', ...rest }) => {
  const sizes = {
    sm: 'h-9 px-3 text-sm',
    md: 'h-10 px-4 text-sm',
    lg: 'h-11 px-5 text-[15px]',
  };
  const variants = {
    primary:   'bg-indigo-600 text-white hover:bg-indigo-700 border border-indigo-600 disabled:bg-indigo-300 disabled:border-indigo-300 disabled:cursor-not-allowed',
    secondary: 'bg-white text-slate-700 hover:bg-slate-50 border border-slate-200',
    outline:   'bg-white text-slate-700 hover:bg-slate-50 border border-slate-300',
    ghost:     'bg-transparent text-slate-600 hover:bg-slate-100 border border-transparent',
    link:      'bg-transparent text-indigo-600 hover:text-indigo-800 border border-transparent px-0 underline-offset-2 hover:underline',
  };
  return (
    <button className={`inline-flex items-center justify-center gap-1.5 whitespace-nowrap rounded-lg font-medium transition-colors ${sizes[size]} ${variants[variant]} ${className}`} {...rest}>
      {children}
    </button>
  );
};

/* ---------- Screen 2: Register ---------- */
const RegisterScreen = () => {
  const [form, setForm] = useState({ username: 'jane_doe', email: 'jane@example.com', pwd: 'Sunset2026!', confirm: 'Sunset2026!' });
  const [show, setShow] = useState(false);
  const update = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const strength = useMemo(() => {
    const p = form.pwd;
    let s = 0;
    if (p.length >= 8) s++;
    if (/[A-Z]/.test(p) && /[a-z]/.test(p)) s++;
    if (/\d/.test(p)) s++;
    if (/[^A-Za-z0-9]/.test(p) && p.length >= 12) s++;
    return s; // 0..4
  }, [form.pwd]);

  const strengthMeta = [
    { label: 'Too short',  color: 'bg-slate-200', text: 'text-slate-400' },
    { label: 'Weak',       color: 'bg-rose-500',  text: 'text-rose-600' },
    { label: 'Fair',       color: 'bg-amber-500', text: 'text-amber-700' },
    { label: 'Good',       color: 'bg-lime-500',  text: 'text-lime-700' },
    { label: 'Strong',     color: 'bg-emerald-600', text: 'text-emerald-700' },
  ][strength];

  const mismatch = form.confirm && form.confirm !== form.pwd;

  return (
    <ScreenShell>
      <div data-screen-label="02 Register" className="max-w-sm mx-auto mt-8">
        <div className="flex flex-col items-center mb-6">
          <div className="w-12 h-12 rounded-2xl bg-indigo-600 grid place-items-center mb-3">
            <Icon.Logo className="w-7 h-7"/>
          </div>
          <div className="text-xl font-semibold tracking-tight">Create your wallet</div>
          <div className="text-sm text-slate-500 mt-0.5">Free forever — no card required</div>
        </div>

        <Card className="p-5">
          <form className="space-y-4" onSubmit={(e)=>e.preventDefault()}>
            <Field label="Username" hint="public, you'll get @ this">
              <TextInput placeholder="jane_doe" value={form.username} onChange={e=>update('username', e.target.value)}/>
            </Field>
            <Field label="Email">
              <TextInput type="email" placeholder="you@example.com" value={form.email} onChange={e=>update('email', e.target.value)}/>
            </Field>
            <Field label="Password" hint="8+ chars, mixed case, a number">
              <div className="relative">
                <TextInput type={show ? 'text' : 'password'} value={form.pwd} onChange={e=>update('pwd', e.target.value)} className="pr-10"/>
                <button type="button" onClick={()=>setShow(s=>!s)} className="absolute right-2 top-1/2 -translate-y-1/2 h-7 w-7 grid place-items-center text-slate-400 hover:text-slate-700 rounded">
                  {show ? <Icon.EyeOff className="w-4 h-4"/> : <Icon.Eye className="w-4 h-4"/>}
                </button>
              </div>

              <div className="mt-2">
                <div className="flex gap-1">
                  {[0,1,2,3].map(i => (
                    <div key={i} className={`h-1.5 flex-1 rounded ${i < strength ? strengthMeta.color : 'bg-slate-200'}`}/>
                  ))}
                </div>
                <div className="flex items-center justify-between mt-1.5">
                  <span className={`text-[11px] font-medium ${strengthMeta.text}`}>{strengthMeta.label}</span>
                  <span className="text-[11px] text-slate-400">{form.pwd.length} characters</span>
                </div>
              </div>
            </Field>

            <Field label="Confirm password" error={mismatch ? 'Passwords don\u2019t match.' : null}>
              <TextInput type={show ? 'text' : 'password'} value={form.confirm} onChange={e=>update('confirm', e.target.value)} className={mismatch ? 'border-rose-300 focus:border-rose-500 focus:ring-rose-100' : ''}/>
            </Field>

            <label className="flex items-start gap-2 text-xs text-slate-600">
              <input type="checkbox" defaultChecked className="w-3.5 h-3.5 mt-0.5 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500"/>
              <span>I agree to the <a className="text-indigo-600 hover:text-indigo-800">Terms of Service</a> and <a className="text-indigo-600 hover:text-indigo-800">Privacy Policy</a>.</span>
            </label>

            <Btn variant="primary" size="lg" type="submit" className="w-full" disabled={mismatch || strength < 2}>Create account</Btn>
          </form>
        </Card>

        <div className="text-center text-sm text-slate-500 mt-5">
          Already have an account? <button className="text-indigo-600 font-medium hover:text-indigo-800">Sign in</button>
        </div>
      </div>
    </ScreenShell>
  );
};

/* ---------- Screen 4: Send Money wizard ---------- */
const StepDots = ({ step }) => (
  <div className="flex items-center justify-center gap-2 mb-6">
    {[0,1,2].map(i => {
      const filled = i <= step;
      return (
        <React.Fragment key={i}>
          <div className={`w-2.5 h-2.5 rounded-full transition-colors ${filled ? 'bg-indigo-600' : 'bg-slate-200'}`}/>
          {i<2 && <div className={`h-px w-8 ${i < step ? 'bg-indigo-600' : 'bg-slate-200'}`}/>}
        </React.Fragment>
      );
    })}
  </div>
);

const SendWizard = () => {
  const [step, setStep] = useState(0);
  const [recipient, setRecipient] = useState('wlt_70218a');
  const [fromId, setFromId] = useState('wlt_8f3a1c');
  const [amount, setAmount] = useState('250.00');
  const [open, setOpen] = useState(false);

  const fromWallet = WALLETS.find(w => w.id === fromId) || WALLETS[0];
  const amountNum = parseFloat(amount) || 0;
  const insufficient = amountNum > fromWallet.available;

  const labels = ['Recipient', 'Amount', 'Confirm'];

  return (
    <ScreenShell>
      <div data-screen-label="04 Send money">
        <div className="text-center mb-1 mt-2">
          <div className="text-[11px] uppercase tracking-wider text-slate-500 font-medium">Step {step+1} of 3</div>
          <div className="text-xl font-semibold tracking-tight mt-1">{labels[step]}</div>
        </div>
        <StepDots step={step}/>

        <div className="max-w-md mx-auto">
          <Card className="p-5 fade-up" key={step}>
            {step === 0 && (
              <div className="space-y-4">
                <Field label="Wallet ID" hint="who you're sending to">
                  <TextInput placeholder="Enter wallet ID..." value={recipient} onChange={e=>setRecipient(e.target.value)} className="font-mono"/>
                </Field>

                <div className="rounded-lg border border-slate-200 bg-slate-50 p-3">
                  <div className="text-[11px] uppercase tracking-wider text-slate-500 font-medium mb-2">Recently sent to</div>
                  <div className="space-y-1">
                    {[
                      { id: 'wlt_70218a', name: 'Linh Nguyen' },
                      { id: 'wlt_c91e54', name: 'Grove Co.' },
                      { id: 'wlt_d033fa', name: 'Amaro Inc.' },
                    ].map(r => (
                      <button key={r.id} onClick={() => setRecipient(r.id)} className={`w-full flex items-center gap-3 px-2 py-1.5 rounded-md hover:bg-white text-left ${recipient===r.id ? 'bg-white border border-indigo-200' : ''}`}>
                        <div className="w-7 h-7 rounded-full bg-indigo-100 text-indigo-700 grid place-items-center text-[11px] font-semibold">
                          {r.name.split(' ').map(s=>s[0]).slice(0,2).join('')}
                        </div>
                        <div className="min-w-0 flex-1">
                          <div className="text-sm font-medium text-slate-800 truncate">{r.name}</div>
                          <div className="text-[11px] text-slate-500 font-mono truncate">{r.id}</div>
                        </div>
                        {recipient===r.id && <Icon.Check className="w-4 h-4 text-indigo-600"/>}
                      </button>
                    ))}
                  </div>
                </div>

                <Btn variant="primary" size="lg" className="w-full" disabled={!recipient} onClick={() => setStep(1)}>
                  Continue <Icon.ArrowRight className="w-4 h-4"/>
                </Btn>
              </div>
            )}

            {step === 1 && (
              <div className="space-y-4">
                <Field label="From wallet">
                  <div className="relative">
                    <button onClick={() => setOpen(o => !o)} className="w-full h-10 px-3 bg-white border border-slate-200 rounded-lg flex items-center text-left hover:bg-slate-50">
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-medium text-slate-800">{fromWallet.label}</div>
                        <div className="text-[11px] text-slate-500 font-mono">{fromWallet.id}</div>
                      </div>
                      <div className="num text-sm text-slate-700">{fmtMoney(fromWallet.available, fromWallet.currency)}</div>
                      <Icon.Chevron className={`w-4 h-4 ml-2 text-slate-400 transition-transform ${open ? 'rotate-180' : ''}`}/>
                    </button>
                    {open && (
                      <div className="absolute left-0 right-0 top-12 bg-white border border-slate-200 rounded-lg z-10 py-1">
                        {WALLETS.map(w => (
                          <button key={w.id} onClick={() => { setFromId(w.id); setOpen(false); }} className="w-full px-3 py-2 flex items-center hover:bg-slate-50 text-left">
                            <div className="flex-1 min-w-0">
                              <div className="text-sm font-medium text-slate-800">{w.label}</div>
                              <div className="text-[11px] text-slate-500 font-mono">{w.id}</div>
                            </div>
                            <div className="num text-sm text-slate-700">{fmtMoney(w.available, w.currency)}</div>
                            {fromId===w.id && <Icon.Check className="w-4 h-4 ml-2 text-indigo-600"/>}
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                </Field>

                <Field label="Amount" error={insufficient ? `Insufficient balance (available: ${fmtMoney(fromWallet.available, fromWallet.currency)})` : null}>
                  <div className="relative">
                    <input
                      type="text"
                      inputMode="decimal"
                      value={amount}
                      onChange={e => setAmount(e.target.value)}
                      className={`h-12 w-full px-3 pr-16 text-xl font-semibold num bg-white border rounded-lg focus:ring-2 ${insufficient ? 'border-rose-300 focus:border-rose-500 focus:ring-rose-100 text-rose-700' : 'border-slate-200 focus:border-indigo-500 focus:ring-indigo-100 text-slate-900'}`}
                    />
                    <div className="absolute right-3 top-1/2 -translate-y-1/2 text-sm font-medium text-slate-500 font-mono">{fromWallet.currency}</div>
                  </div>
                  <div className="flex items-center justify-between mt-1.5">
                    <span className="text-xs text-slate-500">Available <span className="num text-slate-700 font-medium">{fmtMoney(fromWallet.available, fromWallet.currency)}</span></span>
                    <div className="flex gap-1">
                      {[25, 50, 100].map(p => (
                        <button key={p} type="button" onClick={() => setAmount((fromWallet.available * p/100).toFixed(2))} className="text-[11px] px-1.5 py-0.5 rounded bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium">{p}%</button>
                      ))}
                      <button type="button" onClick={() => setAmount(fromWallet.available.toFixed(2))} className="text-[11px] px-1.5 py-0.5 rounded bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium">Max</button>
                    </div>
                  </div>
                </Field>

                <div className="grid grid-cols-2 gap-2 pt-1">
                  <Btn variant="outline" size="lg" onClick={() => setStep(0)}><Icon.ArrowLeft className="w-4 h-4"/>Back</Btn>
                  <Btn variant="primary" size="lg" disabled={insufficient || amountNum <= 0} onClick={() => setStep(2)}>Continue <Icon.ArrowRight className="w-4 h-4"/></Btn>
                </div>
              </div>
            )}

            {step === 2 && (
              <div className="space-y-4">
                <div className="rounded-lg border border-slate-200 overflow-hidden">
                  <div className="px-4 py-3 bg-slate-50 border-b border-slate-200">
                    <div className="text-[11px] uppercase tracking-wider text-slate-500 font-medium">You're sending</div>
                    <div className="text-2xl font-semibold num tracking-tight text-slate-900 mt-0.5">{fmtMoney(amountNum, fromWallet.currency)} <span className="text-sm text-slate-500 font-medium font-mono">{fromWallet.currency}</span></div>
                  </div>
                  <dl className="divide-y divide-slate-100 text-sm">
                    <SummaryRow label="From">
                      <div className="text-right">
                        <div className="text-slate-800 font-medium">{fromWallet.label}</div>
                        <div className="text-[11px] text-slate-500 font-mono">{fromWallet.id} · {fmtMoney(fromWallet.available, fromWallet.currency)} available</div>
                      </div>
                    </SummaryRow>
                    <SummaryRow label="To">
                      <div className="font-mono text-slate-800">{recipient}</div>
                    </SummaryRow>
                    <SummaryRow label="Amount">
                      <span className="num font-medium text-slate-900">{fmtMoney(amountNum, fromWallet.currency)}</span>
                    </SummaryRow>
                    <SummaryRow label="Fee">
                      <span className="num text-slate-500">{fmtMoney(0, fromWallet.currency)}</span>
                    </SummaryRow>
                    <SummaryRow label="Total deducted" emphasize>
                      <span className="num font-semibold text-slate-900">{fmtMoney(amountNum, fromWallet.currency)}</span>
                    </SummaryRow>
                  </dl>
                </div>

                <div className="grid grid-cols-2 gap-2">
                  <Btn variant="outline" size="lg" onClick={() => setStep(1)}><Icon.ArrowLeft className="w-4 h-4"/>Back</Btn>
                  <Btn variant="primary" size="lg" onClick={() => { setStep(0); }}>Confirm &amp; Send</Btn>
                </div>
                <div className="text-center text-[11px] text-slate-500 flex items-center justify-center gap-1.5">
                  <Icon.Warn className="w-3.5 h-3.5 text-amber-500"/>
                  This action cannot be undone.
                </div>
              </div>
            )}
          </Card>
        </div>
      </div>
    </ScreenShell>
  );
};

const SummaryRow = ({ label, children, emphasize }) => (
  <div className={`flex items-start justify-between px-4 py-3 ${emphasize ? 'bg-slate-50' : ''}`}>
    <dt className="text-xs uppercase tracking-wide text-slate-500 font-medium pt-0.5">{label}</dt>
    <dd className="text-sm">{children}</dd>
  </div>
);

/* ---------- Screen 5: History ---------- */
const HistoryScreen = () => {
  const [filter, setFilter] = useState('all');
  const [from, setFrom] = useState('2026-05-01');
  const [to, setTo]     = useState('2026-05-20');
  const [visible, setVisible] = useState(8);

  const filtered = TXNS.filter(t => filter==='all' ? true : (filter==='sent' ? t.dir==='OUT' : t.dir==='IN'));
  const shown = filtered.slice(0, visible);

  // Group by date (May 20, May 19...)
  const groups = useMemo(() => {
    const map = new Map();
    shown.forEach(t => {
      const key = t.date.toDateString();
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(t);
    });
    return [...map.entries()];
  }, [shown]);

  const totals = useMemo(() => {
    const sent = filtered.filter(t=>t.dir==='OUT' && t.currency==='USD').reduce((a,b)=>a+b.amount, 0);
    const recv = filtered.filter(t=>t.dir==='IN' && t.currency==='USD').reduce((a,b)=>a+b.amount, 0);
    return { sent, recv, net: recv - sent };
  }, [filtered]);

  return (
    <>
      <AppBar/>
      <ScreenShell>
        <div data-screen-label="05 History">
          <div className="flex items-end justify-between mb-4">
            <div>
              <div className="text-[22px] font-semibold tracking-tight">Transaction history</div>
              <div className="text-sm text-slate-500 mt-0.5">All movements across your wallets.</div>
            </div>
            <Btn variant="outline" size="sm">Export CSV</Btn>
          </div>

          {/* Totals strip */}
          <div className="grid grid-cols-3 gap-3 mb-4">
            <Card className="p-3">
              <div className="text-[11px] uppercase tracking-wider text-slate-500 font-medium">Received</div>
              <div className="text-lg font-semibold num text-emerald-600 mt-1">+{fmtMoney(totals.recv)}</div>
              <div className="text-[11px] text-slate-400">USD only · {filtered.filter(t=>t.dir==='IN').length} transactions</div>
            </Card>
            <Card className="p-3">
              <div className="text-[11px] uppercase tracking-wider text-slate-500 font-medium">Sent</div>
              <div className="text-lg font-semibold num text-rose-600 mt-1">−{fmtMoney(totals.sent)}</div>
              <div className="text-[11px] text-slate-400">USD only · {filtered.filter(t=>t.dir==='OUT').length} transactions</div>
            </Card>
            <Card className="p-3">
              <div className="text-[11px] uppercase tracking-wider text-slate-500 font-medium">Net</div>
              <div className={`text-lg font-semibold num mt-1 ${totals.net >= 0 ? 'text-slate-900' : 'text-rose-600'}`}>{totals.net >= 0 ? '+' : '−'}{fmtMoney(totals.net)}</div>
              <div className="text-[11px] text-slate-400">May 1 – May 20</div>
            </Card>
          </div>

          {/* Filter bar */}
          <Card className="p-2.5 flex items-center gap-2 flex-wrap mb-3">
            <div className="inline-flex h-8 bg-slate-50 border border-slate-200 rounded-lg p-0.5 text-xs">
              {[['all','All',TXNS.length], ['sent','Sent', TXNS.filter(t=>t.dir==='OUT').length], ['received','Received', TXNS.filter(t=>t.dir==='IN').length]].map(([k,l,n]) => (
                <button
                  key={k}
                  onClick={() => { setFilter(k); setVisible(8); }}
                  className={`px-2.5 h-full rounded-md flex items-center gap-1.5 transition-colors ${filter===k ? 'bg-white border border-slate-200 text-slate-800 font-medium' : 'text-slate-600 hover:text-slate-800'}`}
                >
                  {l}<span className="text-[10px] num text-slate-400">{n}</span>
                </button>
              ))}
            </div>

            <div className="h-5 w-px bg-slate-200 mx-1"/>

            <div className="flex items-center gap-1.5">
              <span className="text-[11px] text-slate-500 font-medium">From</span>
              <div className="relative">
                <Icon.Calendar className="w-3.5 h-3.5 text-slate-400 absolute left-2 top-1/2 -translate-y-1/2"/>
                <input type="date" value={from} onChange={e=>setFrom(e.target.value)} className="h-8 pl-7 pr-2 text-xs border border-slate-200 rounded-md bg-white font-mono"/>
              </div>
            </div>
            <div className="flex items-center gap-1.5">
              <span className="text-[11px] text-slate-500 font-medium">To</span>
              <div className="relative">
                <Icon.Calendar className="w-3.5 h-3.5 text-slate-400 absolute left-2 top-1/2 -translate-y-1/2"/>
                <input type="date" value={to} onChange={e=>setTo(e.target.value)} className="h-8 pl-7 pr-2 text-xs border border-slate-200 rounded-md bg-white font-mono"/>
              </div>
            </div>

            <div className="ml-auto text-xs text-slate-500"><span className="text-slate-800 font-medium num">{filtered.length}</span> transactions</div>
          </Card>

          {/* Grouped list */}
          <Card className="px-4 divide-y divide-slate-100">
            {groups.map(([day, list]) => (
              <div key={day} className="py-2">
                <div className="flex items-center justify-between py-2">
                  <div className="text-[11px] uppercase tracking-wider text-slate-500 font-medium">{dayLabel(day)}</div>
                  <div className="text-[11px] text-slate-400 num">{list.length} {list.length===1?'transaction':'transactions'}</div>
                </div>
                <div className="divide-y divide-slate-100">
                  {list.map(t => <TxnRow key={t.id} t={t} showWalletId/>)}
                </div>
              </div>
            ))}
          </Card>

          <div className="text-center mt-4">
            {visible < filtered.length ? (
              <Btn variant="outline" size="md" onClick={() => setVisible(v => v + 8)}>
                Load more
                <span className="ml-1 text-xs text-slate-400 num">({filtered.length - visible} remaining)</span>
              </Btn>
            ) : (
              <div className="text-xs text-slate-400">— end of history —</div>
            )}
          </div>
        </div>
      </ScreenShell>
    </>
  );
};

function dayLabel(dayStr) {
  const d = new Date(dayStr);
  const today = new Date('2026-05-20');
  const diff = Math.round((today - d) / (1000*60*60*24));
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

/* ---------- Root ---------- */
const App = () => (
  <div className="min-h-screen">
    <RouteLabel route="/login" sub="Sign-in screen — unauthenticated"/>
    <LoginScreen/>

    <Divider/>
    <RouteLabel route="/register" sub="Account creation"/>
    <RegisterScreen/>

    <Divider/>
    <RouteLabel route="/dashboard" sub="Main user screen — authenticated"/>
    <DashboardScreen/>

    <Divider/>
    <RouteLabel route="/send" sub="Three-step send-money wizard"/>
    <SendWizard/>

    <Divider/>
    <RouteLabel route="/history" sub="All transactions across wallets"/>
    <HistoryScreen/>

    <div className="h-12"/>
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
