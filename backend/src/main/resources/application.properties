# --- HTTP ---
quarkus.http.port=8888
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

# --- Datasource (PostgreSQL) ---
quarkus.datasource.db-kind=postgresql
# dev/prod use the local Docker DB; test profile has no URL so dev-services (Testcontainers) auto-start.
%dev.quarkus.datasource.username=walletledger
%dev.quarkus.datasource.password=walletledger
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5435/walletledger
%prod.quarkus.datasource.username=walletledger
%prod.quarkus.datasource.password=walletledger
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5435/walletledger

# --- Hibernate ORM ---
# Schema is owned by Flyway. Hibernate validates only.
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.hibernate-orm.log.sql=false

# --- Flyway ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=classpath:db/migration

# --- OpenAPI / Swagger UI ---
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# --- Test profile: use Quarkus dev-services (Testcontainers), NOT the dev DB ---
# No jdbc.url for test profile → dev-services auto-start a Testcontainers PostgreSQL.
%test.quarkus.datasource.devservices.image-name=postgres:15-alpine
%test.quarkus.http.test-port=0
